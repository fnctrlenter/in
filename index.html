<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KYY Workspace</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <style>
    :root {
      /* Colors */
      --color-bg: #F5F7FA;
      --color-surface: #FFFFFF;
      --color-surface-alt: #FAFBFC;
      --color-border: rgba(15, 23, 42, 0.08);
      --color-border-light: rgba(15, 23, 42, 0.04);
      --color-text: #1A1D26;
      --color-text-secondary: #64748B;
      --color-text-muted: #94A3B8;
      --color-primary: #4F7BFF;
      --color-primary-soft: rgba(79, 123, 255, 0.1);
      --color-success: #10B981;
      --color-success-soft: rgba(16, 185, 129, 0.1);
      
      /* Spacing */
      --gap-xs: 8px;
      --gap-sm: 12px;
      --gap: 16px;
      --gap-lg: 24px;
      --gap-xl: 32px;
      
      /* Radius */
      --radius: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      
      /* Shadows */
      --shadow-xs: 0 1px 2px rgba(15, 23, 42, 0.02);
      --shadow-sm: 0 2px 4px rgba(15, 23, 42, 0.04);
      --shadow: 0 2px 8px rgba(15, 23, 42, 0.04), 0 0 0 1px var(--color-border);
      --shadow-md: 0 4px 16px rgba(15, 23, 42, 0.08), 0 0 0 1px var(--color-border);
      --shadow-lg: 0 8px 24px rgba(15, 23, 42, 0.12), 0 0 0 1px var(--color-border);
      --shadow-hover: 0 12px 36px rgba(79, 123, 255, 0.12), 0 0 0 1px rgba(79, 123, 255, 0.18);
      --shadow-hover-strong: 0 16px 48px rgba(79, 123, 255, 0.16);
      
      /* Typography */
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
      --font-mono: 'Monaco', 'Menlo', monospace;
      --text-xs: 12px;
      --text-sm: 13px;
      --text-base: 15px;
      --text-lg: 16px;
      --text-xl: 18px;
      --text-2xl: 20px;
      --text-3xl: 24px;
      --text-4xl: 32px;
      --weight-normal: 400;
      --weight-medium: 500;
      --weight-semibold: 600;
      --weight-bold: 700;
      
      /* Motion */
      --duration-fast: 100ms;
      --duration-base: 180ms;
      --duration-slow: 300ms;
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-in-out: cubic-bezier(0.4, 0, 0.2, 1);
      
      /* Layout */
      --header-h: 64px;
      --glass: rgba(255, 255, 255, 0.78);
      --max-width: 1280px;
    }
    [data-theme="dark"] {
      --color-bg: #0F1117;
      --color-surface: #1A1D26;
      --color-surface-alt: #161B22;
      --color-border: rgba(255, 255, 255, 0.07);
      --color-border-light: rgba(255, 255, 255, 0.03);
      --color-text: #F1F5F9;
      --color-text-secondary: #94A3B8;
      --color-text-muted: #64748B;
      --color-primary-soft: rgba(79, 123, 255, 0.15);
      --color-success-soft: rgba(16, 185, 129, 0.15);
      --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.1);
      --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.15);
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.25), 0 0 0 1px var(--color-border);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.3), 0 0 0 1px var(--color-border);
      --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.35), 0 0 0 1px var(--color-border);
      --shadow-hover: 0 12px 36px rgba(79, 123, 255, 0.18);
      --shadow-hover-strong: 0 16px 48px rgba(79, 123, 255, 0.22);
      --glass: rgba(26, 29, 38, 0.85);
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --color-bg: #0F1117;
        --color-surface: #1A1D26;
        --color-surface-alt: #161B22;
        --color-border: rgba(255, 255, 255, 0.07);
        --color-border-light: rgba(255, 255, 255, 0.03);
        --color-text: #F1F5F9;
        --color-text-secondary: #94A3B8;
        --color-text-muted: #64748B;
        --color-primary-soft: rgba(79, 123, 255, 0.15);
        --color-success-soft: rgba(16, 185, 129, 0.15);
        --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.1);
        --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.15);
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.25), 0 0 0 1px var(--color-border);
        --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.3), 0 0 0 1px var(--color-border);
        --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.35), 0 0 0 1px var(--color-border);
        --shadow-hover: 0 12px 36px rgba(79, 123, 255, 0.18);
        --shadow-hover-strong: 0 16px 48px rgba(79, 123, 255, 0.22);
        --glass: rgba(26, 29, 38, 0.85);
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font: 15px/1.6 var(--font);
      color: var(--color-text);
      background: var(--color-bg);
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }
    button, input, select { font: inherit; }
    mark { background: rgba(255, 182, 72, 0.35); padding: 0 2px; border-radius: 2px; }

    /* Header */
    .header {
      position: sticky; top: 0; z-index: 100;
      height: var(--header-h);
      display: flex; align-items: center; gap: var(--gap-lg);
      padding: 0 var(--gap-lg);
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--color-border);
      transition: border-color var(--duration-base) var(--ease-out), background var(--duration-base) var(--ease-out);
    }
    .header.scrolled {
      border-bottom-color: var(--color-border-light);
      background: rgba(255, 255, 255, 0.6);
    }
    [data-theme="dark"] .header.scrolled {
      background: rgba(26, 29, 38, 0.75);
    }
    .logo {
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .logo-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, var(--color-primary), #6B9FFF);
      color: #fff; font-weight: var(--weight-bold); font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: transform var(--duration-base) var(--ease-out);
    }
    .header:hover .logo-icon {
      transform: scale(1.05) rotate(-5deg);
    }
    .logo-text { font-weight: var(--weight-bold); font-size: var(--text-lg); letter-spacing: -0.5px; }
    .search-wrap { flex: 1; max-width: 420px; position: relative; }
    .search-wrap input {
      width: 100%; padding: 10px 36px 10px 38px;
      border: 1px solid var(--color-border); border-radius: var(--radius);
      background: var(--color-surface); color: var(--color-text);
      outline: none; transition: all var(--duration-base) var(--ease-out), box-shadow var(--duration-fast) var(--ease-out);
      font-size: var(--text-sm);
    }
    .search-wrap input:hover {
      border-color: var(--color-border);
      box-shadow: var(--shadow-sm);
    }
    .search-wrap input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px var(--color-primary-soft), var(--shadow-sm);
      background: var(--color-surface);
    }
    .search-wrap .icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: .5; }
    .search-clear {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      border: 0; background: var(--color-primary-soft); color: var(--color-primary);
      width: 24px; height: 24px; border-radius: 6px; cursor: pointer; display: none;
    }
    .search-clear.visible { display: block; }
    .header-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }
    .header-btn {
      padding: 8px 12px; border-radius: var(--radius);
      border: 1px solid var(--color-border);
      background: var(--color-surface); color: var(--color-text-secondary);
      cursor: pointer; font-size: var(--text-sm); font-weight: var(--weight-medium);
      transition: all var(--duration-base) var(--ease-out);
    }
    .header-btn:hover {
      background: var(--color-primary-soft); color: var(--color-primary);
      border-color: var(--color-primary-soft);
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }
    .header-btn:active { transform: translateY(0); }
    .text-link {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 12px; border-radius: var(--radius); font-weight: var(--weight-semibold); font-size: var(--text-sm);
      color: var(--color-primary); background: var(--color-primary-soft);
      transition: all var(--duration-base) var(--ease-out);
      text-decoration: none;
    }
    .text-link:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      background: var(--color-primary);
      color: #fff;
    }

    /* Tags */
    .tag-bar {
      display: flex; gap: var(--gap-sm); flex-wrap: wrap;
      padding: var(--gap-lg) var(--gap-lg) 0; max-width: var(--max-width); margin: 0 auto;
    }
    .tag-bar span {
      padding: 7px 14px; border-radius: 999px; font-size: var(--text-xs); font-weight: var(--weight-medium);
      border: 1px solid var(--color-border); background: var(--color-surface);
      color: var(--color-text-secondary); cursor: pointer; transition: all var(--duration-base) var(--ease-out);
      white-space: nowrap;
    }
    .tag-bar span:hover {
      border-color: var(--color-primary);
      background: var(--color-primary-soft);
      color: var(--color-primary);
    }
    .tag-bar span.on {
      background: var(--color-primary); color: #fff; border-color: var(--color-primary);
      box-shadow: 0 0 0 3px var(--color-primary-soft);
    }

    /* Hero */
    .hero {
      max-width: var(--max-width); margin: var(--gap-lg) auto 0; padding: 0 var(--gap-lg);
    }
    .hero-inner {
      display: grid; grid-template-columns: 1fr auto; gap: var(--gap-lg);
      padding: var(--gap-xl); background: var(--color-surface);
      border-radius: var(--radius-lg); border: 1px solid var(--color-border);
      box-shadow: var(--shadow-md);
      transition: all var(--duration-base) var(--ease-out);
    }
    .hero-inner:hover {
      box-shadow: var(--shadow-lg);
      border-color: var(--color-primary-soft);
    }
    .hero h1 { font-size: var(--text-4xl); font-weight: var(--weight-bold); margin-bottom: var(--gap-xs); letter-spacing: -0.5px; }
    .hero .sub { color: var(--color-text-secondary); margin-bottom: var(--gap); font-size: var(--text-base); font-weight: var(--weight-normal); }
    .hero-meta { display: flex; gap: var(--gap-lg); font-size: var(--text-sm); color: var(--color-text-muted); flex-wrap: wrap; }
    .hero-stats { display: flex; gap: var(--gap-xl); margin-top: var(--gap-lg); }
    .hero-stat-val { font-size: 28px; font-weight: var(--weight-bold); color: var(--color-primary); font-variant-numeric: tabular-nums; }
    .hero-stat-label { font-size: var(--text-xs); color: var(--color-text-muted); margin-top: 6px; font-weight: var(--weight-medium); }
    .hero-recent { min-width: 260px; }
    .hero-recent h3 { font-size: var(--text-sm); color: var(--color-text-secondary); margin-bottom: var(--gap-sm); font-weight: var(--weight-semibold); text-transform: uppercase; letter-spacing: 0.5px; }
    .hero-recent-item {
      display: flex; align-items: center; gap: var(--gap-sm); padding: var(--gap-sm) var(--gap-sm);
      border-radius: var(--radius); cursor: pointer; font-size: var(--text-sm); margin-bottom: 4px;
      transition: all var(--duration-base) var(--ease-out);
      background: transparent; color: var(--color-text-secondary);
    }
    .hero-recent-item:hover {
      background: var(--color-primary-soft); color: var(--color-primary);
      transform: translateX(4px);
    }

    /* Quick actions */
    .quick-actions {
      max-width: var(--max-width); margin: var(--gap-lg) auto 0; padding: 0 var(--gap-lg);
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: var(--gap);
    }
    .quick-action {
      display: flex; align-items: center; gap: var(--gap); padding: var(--gap-lg);
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-lg); cursor: pointer;
      transition: all var(--duration-base) var(--ease-out);
      box-shadow: var(--shadow);
    }
    .quick-action:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
      border-color: var(--color-primary-soft);
      background: var(--color-surface-alt);
    }
    .quick-action:active { transform: translateY(-2px); }
    .quick-action .icon { font-size: 24px; flex-shrink: 0; }
    .quick-action h4 { font-size: var(--text-sm); margin-bottom: 4px; font-weight: var(--weight-semibold); }
    .quick-action p { font-size: var(--text-xs); color: var(--color-text-muted); margin: 0; }

    /* Sections */
    .main { max-width: var(--max-width); margin: 0 auto; padding: var(--gap-xl); }
    .section { margin-bottom: var(--gap-xl); scroll-margin-top: 80px; }
    .section-head {
      display: flex; align-items: flex-end; justify-content: space-between;
      margin-bottom: var(--gap-lg); gap: var(--gap-lg); padding-bottom: var(--gap-lg);
      border-bottom: 1px solid var(--color-border-light);
    }
    .section-head h2 { font-size: var(--text-2xl); font-weight: var(--weight-bold); display: flex; align-items: center; gap: 8px; letter-spacing: -0.5px; }
    .section-head p { font-size: var(--text-sm); color: var(--color-text-secondary); margin: 0; font-weight: var(--weight-normal); }
    .section-count {
      font-size: var(--text-xs); color: var(--color-text-muted);
      background: var(--color-bg); padding: 4px 12px; border-radius: 999px;
      font-weight: var(--weight-medium);
    }
    .section-scroll {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: var(--gap);
      padding-bottom: 8px;
    }

    /* Card */
    .card {
      background: var(--color-surface); border-radius: var(--radius-lg);
      box-shadow: var(--shadow); padding: var(--gap);
      display: flex; flex-direction: column; position: relative;
      cursor: pointer;
      transition: all var(--duration-base) var(--ease-out);
      border: 1px solid var(--color-border);
      overflow: hidden;
      height: auto;
      min-height: 200px;
    }
    .card::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--color-primary-soft) 0%, transparent 100%);
      opacity: 0; transition: opacity var(--duration-base) var(--ease-out);
      pointer-events: none;
    }
    .card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-hover-strong);
      border-color: var(--color-primary-soft);
    }
    .card:hover::before { opacity: 1; }
    .card-top { display: flex; align-items: flex-start; gap: var(--gap-sm); margin-bottom: var(--gap-sm); position: relative; z-index: 1; }
    .card-logo {
      width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
      background: var(--color-bg); border: 1px solid var(--color-border);
      display: flex; align-items: center; justify-content: center; overflow: hidden;
      transition: transform var(--duration-base) var(--ease-out);
      font-size: 20px;
    }
    .card:hover .card-logo { transform: rotate(-8deg) scale(1.1); }
    .card-logo img { width: 100%; height: 100%; object-fit: cover; }
    .card-name { font-size: var(--text-base); font-weight: var(--weight-semibold); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-desc {
      font-size: var(--text-sm); color: var(--color-text-secondary); line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      flex: 1; margin-bottom: var(--gap-sm); position: relative; z-index: 1;
    }
    .card-tags { display: flex; flex-wrap: wrap; gap: 4px; position: relative; z-index: 1; }
    .card-tag {
      font-size: var(--text-xs); padding: 3px 8px; border-radius: 5px;
      background: var(--color-primary-soft); color: var(--color-primary); border: none; font-weight: var(--weight-medium);
    }
    .card-actions {
      position: absolute; top: 12px; right: 12px;
      display: flex; gap: 6px; opacity: 0; transition: opacity var(--duration-base) var(--ease-out);
      z-index: 2;
    }
    .card:hover .card-actions { opacity: 1; }
    .card-btn {
      width: 32px; height: 32px; border-radius: 8px;
      border: 1px solid var(--color-border); background: var(--color-surface);
      cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center;
      transition: all var(--duration-base) var(--ease-out);
      backdrop-filter: blur(10px);
    }
    .card-btn:hover { background: var(--color-primary-soft); border-color: var(--color-primary); transform: scale(1.1); }
    .card-visit {
      position: absolute; bottom: 12px; right: 12px;
      padding: 6px 12px; background: var(--color-primary); color: #fff;
      font-size: var(--text-xs); font-weight: var(--weight-semibold); border-radius: 8px; opacity: 0; transition: opacity var(--duration-base) var(--ease-out);
      z-index: 2;
    }
    .card:hover .card-visit { opacity: 1; }
    .empty { padding: 48px 32px; text-align: center; color: var(--color-text-muted); font-size: var(--text-base); }
    .counter { font-size: var(--text-sm); color: var(--color-primary); font-weight: var(--weight-semibold); }

    @media (max-width: 900px) {
      .hero-inner { grid-template-columns: 1fr; }
      .quick-actions { grid-template-columns: repeat(2, 1fr); }
      .logo-text { display: none; }
      .section-head { flex-direction: column; align-items: flex-start; }
    }
    @media (max-width: 600px) {
      .header { padding: 0 var(--gap); gap: var(--gap); }
      .tag-bar, .hero, .quick-actions, .main { padding-left: var(--gap); padding-right: var(--gap); }
      .quick-actions { grid-template-columns: 1fr; }
      .hero-stats { flex-direction: column; gap: var(--gap); }
      .card { flex: 0 0 260px; width: 260px; height: 160px; padding: var(--gap); }
      .hero-recent { min-width: 100%; }
      .search-wrap { max-width: 100%; }
      .header-actions { gap: 4px; font-size: 12px; }
      .section-count { display: none; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-icon">K</div>
    <span class="logo-text">KYY Workspace</span>
  </div>
  <a href="text.html" class="text-link"><span>📝</span>文本缓存</a>
  <div class="search-wrap">
    <span class="icon">🔍</span>
    <input id="search" placeholder="搜索名称 / 简介 / 标签" aria-label="搜索">
    <button id="searchClear" class="search-clear" aria-label="清除">✕</button>
  </div>
  <div class="header-actions">
    <select id="sortSelect" class="header-btn" aria-label="排序">
      <option value="default">默认排序</option>
      <option value="name">按名称</option>
      <option value="fav">按收藏</option>
    </select>
    <span class="counter" id="counter">0 个工具</span>
    <button class="header-btn" id="exportBtn" title="导出">📦 导出</button>
    <button class="header-btn" id="themeToggle" title="切换主题">🌓</button>
    <button class="header-btn" id="reset">重置</button>
  </div>
</header>

<div class="tag-bar" role="list">
  <span data-tag="all" class="on">全部</span>
  <span data-tag="AI">AI</span>
  <span data-tag="开发">开发</span>
  <span data-tag="设计">设计</span>
  <span data-tag="学习">学习</span>
  <span data-tag="办公">办公</span>
  <span data-tag="文件">文件</span>
  <span data-tag="视频">视频</span>
  <span data-tag="资源">资源</span>
  <span data-tag="fav">⭐ 收藏</span>
</div>

<section class="hero">
  <div class="hero-inner">
    <div>
      <h1 id="greeting">下午好 👋</h1>
      <p class="sub" id="welcome">欢迎回来</p>
      <div class="hero-meta">
        <span id="heroDate"></span>
        <span id="heroTime"></span>
      </div>
      <div class="hero-stats">
        <div><div class="hero-stat-val" id="statTotal">0</div><div class="hero-stat-label">工具总数</div></div>
        <div><div class="hero-stat-val" id="statFav">0</div><div class="hero-stat-label">收藏数量</div></div>
        <div><div class="hero-stat-val" id="statRecent">0</div><div class="hero-stat-label">最近访问</div></div>
      </div>
    </div>
    <div class="hero-recent">
      <h3>最近使用</h3>
      <div id="heroRecentList"></div>
    </div>
  </div>
</section>

<div class="quick-actions">
  <div class="quick-action" data-action="search"><span class="icon">🔍</span><div><h4>搜索工具</h4><p>快速定位所需站点</p></div></div>
  <div class="quick-action" data-action="text" onclick="location.href='text.html'"><span class="icon">📝</span><div><h4>文本缓存</h4><p>跨设备临时文本</p></div></div>
  <div class="quick-action" data-action="fav"><span class="icon">⭐</span><div><h4>我的收藏</h4><p>常用工具直达</p></div></div>
  <div class="quick-action" data-action="recent"><span class="icon">🕒</span><div><h4>最近访问</h4><p>继续上次工作</p></div></div>
</div>

<main class="main" id="mainContent"></main>

<script>
const CATEGORIES = [
  { id: 'AI', icon: '🤖', name: 'AI', desc: '对话模型、智能助手与 AI 创作' },

let sortMode = localStorage.getItem('sortMode') || 'default';
let themeMode = localStorage.getItem('themeMode') || 'auto';
const searchInput = document.getElementById('search');
const searchClear = document.getElementById('searchClear');
const tagFilter = document.querySelectorAll('.tag-bar span');
const sortSelect = document.getElementById('sortSelect');
sortSelect.value = sortMode;

function getFavMap() { return JSON.parse(localStorage.getItem('favMap') || '{}'); }
function getRecentList() { return JSON.parse(localStorage.getItem('recentList') || '[]'); }

function addRecent(item) {
  let list = getRecentList().filter(r => r.url !== item.url);
  list.unshift({ name: item.name, url: item.url, emoji: item.emoji, category: item.category, time: Date.now() });
  localStorage.setItem('recentList', JSON.stringify(list.slice(0, 20)));
}

function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function highlight(text, kw) {
  if (!kw) return escapeHtml(text);
  const s = escapeHtml(text);
  try { return s.replace(new RegExp('(' + kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'ig'), '<mark>$1</mark>'); }
  catch { return s; }
}
function getFavicon(url) {
  try { return `https://icons.duckduckgo.com/ip3/${new URL(url).hostname}.ico`; } catch { return ''; }
}
function getGreeting() {
  const h = new Date().getHours();
  if (h < 6) return '夜深了'; if (h < 12) return '早上好'; if (h < 14) return '中午好'; if (h < 18) return '下午好'; return '晚上好';
}
function copyFallback(text, btn) {
  const ta = document.createElement('textarea'); ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
  document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
  btn.textContent = '已复制'; setTimeout(() => btn.textContent = '复制', 1200);
}

function openTool(item) {
  addRecent(item);
  window.open(item.url, '_blank', 'noopener');
  updateHero();
}

function createCard(item, kw) {
  const favMap = getFavMap();
  const isFav = !!favMap[item.url];
  const favicon = getFavicon(item.url);
  const card = document.createElement('article');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-actions">
      <button class="card-btn fav" title="收藏">${isFav ? '❤️' : '🤍'}</button>
      <button class="card-btn copy" title="复制链接">🔗</button>
    </div>
    <div class="card-top">
      <div class="card-logo">${favicon ? `<img src="${favicon}" alt="" onerror="this.parentElement.textContent='${item.emoji}'">` : item.emoji}</div>
      <div class="card-name">${highlight(item.name, kw)}</div>
    </div>
    <p class="card-desc">${highlight(item.desc, kw)}</p>
    <div class="card-tags">${(item.tags||[]).slice(0,3).map(t => `<span class="card-tag">${escapeHtml(t)}</span>`).join('')}</div>
    <span class="card-visit">访问 →</span>`;

  card.querySelector('.fav').addEventListener('click', e => {
    e.stopPropagation();
    const map = getFavMap();
    if (map[item.url]) delete map[item.url]; else map[item.url] = true;
    localStorage.setItem('favMap', JSON.stringify(map));
    e.target.textContent = map[item.url] ? '❤️' : '🤍';
    updateHero();
    render();
  });
  card.querySelector('.copy').addEventListener('click', e => {
    e.stopPropagation();
    const btn = e.target;
    if (navigator.clipboard) navigator.clipboard.writeText(item.url).then(() => { btn.textContent = '✓'; setTimeout(() => btn.textContent = '🔗', 1200); }).catch(() => copyFallback(item.url, btn));
    else copyFallback(item.url, btn);
  });
  card.addEventListener('click', () => openTool(item));
  return card;
}

function getFilteredItems() {
  const kw = (searchInput?.value || '').trim().toLowerCase();
  const activeTag = document.querySelector('.tag-bar span.on')?.dataset.tag || 'all';
  const favMap = getFavMap();
  let items = cardData.filter(item => {
    const txt = [item.name, item.desc, ...(item.tags||[]), item.category].join(' ').toLowerCase();
    const hitKw = !kw || txt.includes(kw);
    let hitTag = true;
    if (activeTag === 'fav') hitTag = !!favMap[item.url];
    else if (activeTag !== 'all') hitTag = item.category === activeTag;
    return hitKw && hitTag;
  });
  if (sortMode === 'name') items.sort((a,b) => a.name.localeCompare(b.name, 'zh-CN'));
  if (sortMode === 'fav') items.sort((a,b) => (favMap[b.url]?1:0) - (favMap[a.url]?1:0));
  return items;
}

function render() {
  const main = document.getElementById('mainContent');
  const items = getFilteredItems();
  const counter = document.getElementById('counter');
  if (counter) counter.textContent = `${items.length} 个工具`;
  main.innerHTML = '';

  if (!items.length) {
    main.innerHTML = '<div class="empty">没有找到匹配的工具，试试其他关键词或分类</div>';
    return;
  }

  const activeTag = document.querySelector('.tag-bar span.on')?.dataset.tag || 'all';
  const groups = activeTag === 'all' || activeTag === 'fav'
    ? CATEGORIES.map(c => ({ ...c, items: items.filter(i => i.category === c.id) })).filter(g => g.items.length)
    : [{ id: activeTag, icon: '', name: activeTag, desc: '', items }];

  if (activeTag === 'fav') {
    const sec = document.createElement('section');
    sec.className = 'section';
    sec.innerHTML = `<div class="section-head"><div><h2>⭐ 我的收藏</h2><p>你标记的常用工具</p></div><span class="section-count">${items.length} 个</span></div>`;
    const scroll = document.createElement('div'); scroll.className = 'section-scroll';
    const kw = searchInput?.value?.trim() || '';
    items.forEach(i => scroll.appendChild(createCard(i, kw)));
    sec.appendChild(scroll); main.appendChild(sec);
    return;
  }

  const kw = searchInput?.value?.trim() || '';
  groups.forEach(g => {
    const sec = document.createElement('section');
    sec.className = 'section';
    sec.id = 'sec-' + g.id;
    sec.innerHTML = `<div class="section-head"><div><h2>${g.icon} ${g.name}</h2>${g.desc ? `<p>${g.desc}</p>` : ''}</div><span class="section-count">${g.items.length} 个</span></div>`;
    const scroll = document.createElement('div'); scroll.className = 'section-scroll';
    g.items.forEach(i => scroll.appendChild(createCard(i, kw)));
    sec.appendChild(scroll); main.appendChild(sec);
  });
}

function updateHero() {
  document.getElementById('greeting').textContent = getGreeting() + ' 👋';
  document.getElementById('welcome').textContent = ['今天也要高效工作 ✨','你的第二桌面，随时待命','搜索优先，一键直达'][Math.floor(Math.random()*3)];
  const now = new Date();
  const wd = ['日','一','二','三','四','五','六'];
  document.getElementById('heroDate').textContent = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 星期${wd[now.getDay()]}`;
  document.getElementById('heroTime').textContent = now.toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' });
  document.getElementById('statTotal').textContent = cardData.length;
  document.getElementById('statFav').textContent = Object.keys(getFavMap()).length;
  document.getElementById('statRecent').textContent = getRecentList().length;

  const list = document.getElementById('heroRecentList');
  const recent = getRecentList().slice(0, 3);
  if (!recent.length) { list.innerHTML = '<div style="font-size:13px;color:var(--color-text-muted)">暂无记录</div>'; return; }
  list.innerHTML = recent.map(r => `<div class="hero-recent-item" data-url="${r.url}"><span>${r.emoji||'📌'}</span>${escapeHtml(r.name)}</div>`).join('');
  list.querySelectorAll('.hero-recent-item').forEach(el => {
    el.addEventListener('click', () => { const t = cardData.find(c => c.url === el.dataset.url); if (t) openTool(t); });
  });
}

function applyTheme() {
  const root = document.documentElement;
  if (themeMode === 'auto') root.removeAttribute('data-theme');
  else root.setAttribute('data-theme', themeMode);
  const icons = { light:'☀️', dark:'🌙', auto:'🌓' };
  document.getElementById('themeToggle').textContent = icons[themeMode];
}

// Events
searchInput.addEventListener('input', () => {
  searchClear.classList.toggle('visible', !!searchInput.value.trim());
  render();
});
searchClear.addEventListener('click', () => { searchInput.value = ''; searchClear.classList.remove('visible'); render(); searchInput.focus(); });
tagFilter.forEach(btn => btn.addEventListener('click', () => {
  tagFilter.forEach(b => b.classList.remove('on')); btn.classList.add('on'); render();
}));
sortSelect.addEventListener('change', e => { sortMode = e.target.value; localStorage.setItem('sortMode', sortMode); render(); });
document.getElementById('reset').addEventListener('click', () => {
  searchInput.value = ''; tagFilter.forEach(b => b.classList.remove('on')); tagFilter[0].classList.add('on'); render(); searchInput.focus();
});
document.getElementById('exportBtn').addEventListener('click', () => {
  const blob = new Blob([document.documentElement.outerHTML], { type: 'text/html' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'kyy-workspace.html'; a.click();
});
document.getElementById('themeToggle').addEventListener('click', () => {
  const modes = ['auto','light','dark'];
  themeMode = modes[(modes.indexOf(themeMode)+1) % modes.length];
  localStorage.setItem('themeMode', themeMode); applyTheme();
});
document.querySelectorAll('.quick-action').forEach(el => {
  el.addEventListener('click', () => {
    const a = el.dataset.action;
    if (a === 'search') searchInput.focus();
    if (a === 'fav') { tagFilter.forEach(b => b.classList.remove('on')); document.querySelector('[data-tag="fav"]').classList.add('on'); render(); }
    if (a === 'recent') {
      const r = getRecentList()[0];
      if (r) { const t = cardData.find(c => c.url === r.url); if (t) openTool(t); }
    }
  });
});

applyTheme();
updateHero();
render();
setInterval(() => { document.getElementById('heroTime').textContent = new Date().toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' }); }, 30000);

// 滚动效果
let lastScrollY = 0;
const header = document.querySelector('.header');
window.addEventListener('scroll', () => {
  const scrollY = window.scrollY;
  if (scrollY > 10 && lastScrollY <= 10) {
    header.classList.add('scrolled');
  } else if (scrollY <= 10 && lastScrollY > 10) {
    header.classList.remove('scrolled');
  }
  lastScrollY = scrollY;
}, { passive: true });

// Command K 快捷键
document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    searchInput.focus();
    searchInput.select();
  }
  if (e.key === 'Escape') {
    if (searchInput === document.activeElement) {
      searchInput.blur();
      searchInput.value = '';
      searchClear.classList.remove('visible');
      render();
    }
  }
});
