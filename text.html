<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地文本缓存器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --color-bg: #F5F7FA;
            --color-surface: #FFFFFF;
            --color-border: rgba(15, 23, 42, 0.08);
            --color-text: #1A1D26;
            --color-text-secondary: #64748B;
            --color-text-muted: #94A3B8;
            --color-primary: #4F7BFF;
            --color-primary-soft: rgba(79, 123, 255, 0.1);
            --color-success: #10B981;
            --color-success-soft: rgba(16, 185, 129, 0.1);
            --radius: 12px;
            --radius-lg: 16px;
            --shadow: 0 2px 8px rgba(15, 23, 42, 0.04), 0 0 0 1px var(--color-border);
            --shadow-hover: 0 12px 36px rgba(79, 123, 255, 0.12), 0 0 0 1px rgba(79, 123, 255, 0.18);
            --duration-base: 180ms;
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --color-bg: #0F1117;
                --color-surface: #1A1D26;
                --color-border: rgba(255, 255, 255, 0.07);
                --color-text: #F1F5F9;
                --color-text-secondary: #94A3B8;
                --color-text-muted: #64748B;
                --color-primary-soft: rgba(79, 123, 255, 0.15);
                --color-success-soft: rgba(16, 185, 129, 0.15);
                --shadow: 0 2px 8px rgba(0, 0, 0, 0.25), 0 0 0 1px var(--color-border);
                --shadow-hover: 0 12px 36px rgba(79, 123, 255, 0.18);
            }
        }
        body {
            font-family: var(--font);
            padding: 20px;
            background: var(--color-bg);
            color: var(--color-text);
            min-height: 100vh;
            transition: background-color var(--duration-base) var(--ease-out), color var(--duration-base) var(--ease-out);
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--color-surface);
            padding: 30px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            transition: all var(--duration-base) var(--ease-out);
        }
        h1 {
            color: var(--color-text);
            margin-bottom: 20px;
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .subtitle {
            text-align: center;
            color: var(--color-text-secondary);
            margin-bottom: 30px;
            font-size: 15px;
            font-weight: 400;
        }
        textarea {
            width: 100%;
            height: 300px;
            padding: 15px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            font-size: 15px;
            font-family: var(--font);
            resize: vertical;
            margin-bottom: 15px;
            background: var(--color-surface);
            color: var(--color-text);
            transition: all var(--duration-base) var(--ease-out);
        }
        textarea:hover {
            border-color: var(--color-border);
            box-shadow: 0 2px 4px rgba(15, 23, 42, 0.04);
        }
        textarea:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px var(--color-primary-soft);
        }
        .status {
            text-align: center;
            color: var(--color-text-secondary);
            font-size: 13px;
            padding: 12px;
            background-color: var(--color-bg);
            border-radius: var(--radius);
            margin-bottom: 20px;
            transition: all var(--duration-base) var(--ease-out);
            border: 1px solid var(--color-border);
        }
        .status.updated {
            background-color: var(--color-success-soft);
            color: var(--color-success);
            border-color: var(--color-success);
        }
        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        button {
            padding: 12px 20px;
            background-color: var(--color-primary);
            color: white;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            font-family: var(--font);
            transition: all var(--duration-base) var(--ease-out);
            min-width: 120px;
        }
        button:hover {
            background-color: #3E63FF;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(79, 123, 255, 0.2);
        }
        button:active {
            transform: translateY(0);
        }
        .btn-clear {
            background-color: #EF4444;
        }
        .btn-clear:hover {
            background-color: #DC2626;
        }
        .btn-export {
            background-color: #3B82F6;
        }
        .btn-export:hover {
            background-color: #2563EB;
        }
        .btn-import {
            background-color: #F59E0B;
        }
        .btn-import:hover {
            background-color: #D97706;
        }
        .btn-copy {
            background-color: #8B5CF6;
        }
        .btn-copy:hover {
            background-color: #7C3AED;
        }
        #historyBtn {
            background-color: var(--color-primary);
        }
        #historyBtn:hover {
            background-color: #3E63FF;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            background-color: var(--color-bg);
            padding: 20px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            font-size: 14px;
            border: 1px solid var(--color-border);
        }
        .stat-item {
            text-align: center;
        }
        .stat-value {
            font-weight: 700;
            font-size: 24px;
            color: var(--color-primary);
            font-variant-numeric: tabular-nums;
        }
        .stat-label {
            color: var(--color-text-muted);
            margin-top: 6px;
            font-size: 12px;
            font-weight: 500;
        }
        .search-box {
            margin-bottom: 20px;
        }
        .search-box input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            font-size: 15px;
            font-family: var(--font);
            background: var(--color-surface);
            color: var(--color-text);
            transition: all var(--duration-base) var(--ease-out);
        }
        .search-box input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px var(--color-primary-soft);
        }
        .highlight {
            background-color: yellow;
            font-weight: bold;
        }
        .history-section {
            margin-top: 30px;
        }
        .history-section h2 {
            margin-bottom: 15px;
            color: var(--color-text);
            font-size: 18px;
            font-weight: 700;
        }
        .history-list {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            padding: 10px;
            background: var(--color-bg);
        }
        .history-item {
            padding: 10px;
            border-bottom: 1px solid var(--color-border-light);
            cursor: pointer;
            transition: background-color var(--duration-base) var(--ease-out);
            border-radius: 6px;
            margin-bottom: 4px;
        }
        .history-item:hover {
            background-color: var(--color-primary-soft);
            color: var(--color-primary);
        }
        .history-item:last-child {
            border-bottom: none;
        }
        .timestamp {
            font-size: 12px;
            color: var(--color-text-muted);
            float: right;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn var(--duration-base) var(--ease-out);
        }
        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }
        .modal-content {
            background-color: var(--color-surface);
            margin: 15% auto;
            padding: 30px;
            border-radius: var(--radius-lg);
            width: 80%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp var(--duration-base) var(--ease-out);
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; }
        }
        .close {
            color: var(--color-text-muted);
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color var(--duration-base) var(--ease-out);
        }
        .close:hover {
            color: var(--color-text);
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            margin: 10px auto 18px auto;
            border-radius: var(--radius);
            background: var(--color-primary-soft);
            color: var(--color-primary);
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            box-shadow: var(--shadow);
            border: 1px solid var(--color-primary-soft);
            transition: all var(--duration-base) var(--ease-out);
        }
        .back-btn:hover {
            background: var(--color-primary);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(79, 123, 255, 0.2);
        }
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            .button-group {
                flex-direction: column;
                align-items: center;
            }
            button {
                width: 100%;
                max-width: 300px;
            }
            .stats {
                flex-direction: column;
                gap: 15px;
            }
            .history-section {
                margin-top: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
                <h1>📝 本地文本缓存器</h1>
            <a href="index.html" class=\"back-btn\">
                    <span style=\"font-size:18px;\">←</span>返回工具导航
                </a>
        <p class="subtitle">自动保存您的文本内容，支持多种实用功能</p>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 在文本中搜索...">
        </div>
        
        <textarea id="textInput" placeholder="请输入需要缓存的文本内容..."></textarea>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="charCount">0</div>
                <div class="stat-label">字符数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="wordCount">0</div>
                <div class="stat-label">单词数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="lineCount">0</div>
                <div class="stat-label">行数</div>
            </div>
        </div>
        
        <div class="status" id="status">已自动加载上次保存的内容，输入时实时缓存</div>
        
        <div class="button-group">
            <button id="clearBtn" class="btn-clear">🗑️ 清空内容</button>
            <button id="copyBtn" class="btn-copy">📋 复制内容</button>
            <button id="exportBtn" class="btn-export">💾 导出文件</button>
            <button id="importBtn" class="btn-import">📂 导入文件</button>
            <button id="historyBtn">🕒 历史记录</button>
        </div>
        
        <div class="history-section">
            <h2>📌 快速访问</h2>
            <div class="history-list" id="historyList">
                <!-- 历史记录将在这里显示 -->
            </div>
        </div>
    </div>
    
    <!-- 导入文件的隐藏输入框 -->
    <input type="file" id="fileInput" accept=".txt,.md,.html" style="display: none;">
    
    <!-- 历史记录模态框 -->
    <div id="historyModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>🕒 历史记录</h2>
            <div id="modalHistoryList" style="max-height: 300px; overflow-y: auto; margin-top: 15px;">
                <!-- 历史记录将在这里显示 -->
            </div>
        </div>
    </div>

    <script>
        // 获取DOM元素
        const textInput = document.getElementById('textInput');
        const status = document.getElementById('status');
        const clearBtn = document.getElementById('clearBtn');
        const copyBtn = document.getElementById('copyBtn');
        const exportBtn = document.getElementById('exportBtn');
        const importBtn = document.getElementById('importBtn');
        const fileInput = document.getElementById('fileInput');
        const historyBtn = document.getElementById('historyBtn');
        const historyList = document.getElementById('historyList');
        const historyModal = document.getElementById('historyModal');
        const modalHistoryList = document.getElementById('modalHistoryList');
        const closeBtn = document.querySelector('.close');
        const searchInput = document.getElementById('searchInput');
        const charCount = document.getElementById('charCount');
        const wordCount = document.getElementById('wordCount');
        const lineCount = document.getElementById('lineCount');
        
        const storageKey = 'savedText'; // 存储数据的键名
        const historyKey = 'textHistory'; // 历史记录的键名
        
        // 页面加载时读取缓存
        window.onload = function() {
            loadSavedText();
            updateStats();
            loadQuickHistory();
        };
        
        // 加载保存的文本
        function loadSavedText() {
            const savedText = localStorage.getItem(storageKey);
            if (savedText) {
                textInput.value = savedText;
                status.textContent = '✅ 已成功加载上次保存的内容';
                status.classList.add('updated');
                setTimeout(() => status.classList.remove('updated'), 2000);
            } else {
                status.textContent = 'ℹ️ 首次使用，输入内容将自动缓存';
            }
        }
        
        // 更新统计信息
        function updateStats() {
            const text = textInput.value;
            charCount.textContent = text.length;
            wordCount.textContent = text.trim() ? text.trim().split(/\s+/).length : 0;
            lineCount.textContent = text.split(/\r\n|\r|\n/).length;
        }
        
        // 输入时实时缓存
        textInput.addEventListener('input', function() {
            localStorage.setItem(storageKey, textInput.value);
            status.textContent = '✅ 内容已实时缓存';
            status.classList.add('updated');
            setTimeout(() => status.classList.remove('updated'), 2000);
            updateStats();
            saveToHistory(textInput.value);
        });
        
        // 搜索功能
        searchInput.addEventListener('input', function() {
            const searchTerm = searchInput.value;
            if (searchTerm) {
                highlightText(searchTerm);
            } else {
                // 清除高亮
                textInput.value = textInput.value.replace(/<mark class="highlight">(.*?)<\/mark>/g, '$1');
            }
        });
        
        // 高亮搜索文本
        function highlightText(term) {
            const text = textInput.value;
            const regex = new RegExp(`(${term})`, 'gi');
            const highlightedText = text.replace(regex, '<mark class="highlight">$1</mark>');
            textInput.value = highlightedText;
        }
        
        // 清空内容和缓存
        clearBtn.addEventListener('click', function() {
            if (confirm('确定要清空所有内容吗？清空后无法恢复')) {
                textInput.value = '';
                localStorage.removeItem(storageKey);
                status.textContent = 'ℹ️ 内容已清空，重新输入将再次缓存';
                updateStats();
            }
        });
        
        // 复制内容到剪贴板
        copyBtn.addEventListener('click', function() {
            if (textInput.value) {
                textInput.select();
                document.execCommand('copy');
                status.textContent = '✅ 内容已复制到剪贴板';
                status.classList.add('updated');
                setTimeout(() => status.classList.remove('updated'), 2000);
            } else {
                status.textContent = '⚠️ 没有内容可复制';
            }
        });
        
        // 导出文件
        exportBtn.addEventListener('click', function() {
            const text = textInput.value;
            if (!text) {
                status.textContent = '⚠️ 没有内容可导出';
                return;
            }
            
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'text-cache-' + new Date().toISOString().slice(0, 19).replace(/:/g, '-') + '.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            status.textContent = '✅ 文件已导出';
            status.classList.add('updated');
            setTimeout(() => status.classList.remove('updated'), 2000);
        });
        
        // 导入文件
        importBtn.addEventListener('click', function() {
            fileInput.click();
        });
        
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    textInput.value = e.target.result;
                    localStorage.setItem(storageKey, textInput.value);
                    status.textContent = '✅ 文件已导入并缓存';
                    status.classList.add('updated');
                    setTimeout(() => status.classList.remove('updated'), 2000);
                    updateStats();
                    saveToHistory(textInput.value);
                };
                reader.readAsText(file);
            }
        });
        
        // 保存到历史记录
        function saveToHistory(text) {
            if (!text.trim()) return;
            
            const history = JSON.parse(localStorage.getItem(historyKey) || '[]');
            const now = new Date();
            const timestamp = now.toLocaleString('zh-CN');
            
            // 检查是否与最近一次记录相同
            if (history.length > 0 && history[0].text === text) {
                // 更新时间戳
                history[0].timestamp = timestamp;
            } else {
                // 添加新记录
                history.unshift({
                    text: text,
                    timestamp: timestamp,
                    id: Date.now()
                });
                
                // 限制历史记录数量
                if (history.length > 20) {
                    history.pop();
                }
            }
            
            localStorage.setItem(historyKey, JSON.stringify(history));
            loadQuickHistory();
        }
        
        // 加载快速历史记录
        function loadQuickHistory() {
            const history = JSON.parse(localStorage.getItem(historyKey) || '[]');
            historyList.innerHTML = '';
            
            // 只显示最近5条记录
            const recentHistory = history.slice(0, 5);
            
            if (recentHistory.length === 0) {
                historyList.innerHTML = '<div class="history-item">暂无历史记录</div>';
                return;
            }
            
            recentHistory.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <span>${item.text.substring(0, 30)}${item.text.length > 30 ? '...' : ''}</span>
                    <span class="timestamp">${item.timestamp}</span>
                `;
                div.addEventListener('click', () => {
                    textInput.value = item.text;
                    localStorage.setItem(storageKey, item.text);
                    status.textContent = '✅ 已加载历史记录';
                    status.classList.add('updated');
                    setTimeout(() => status.classList.remove('updated'), 2000);
                    updateStats();
                });
                historyList.appendChild(div);
            });
        }
        
        // 显示完整历史记录
        historyBtn.addEventListener('click', function() {
            const history = JSON.parse(localStorage.getItem(historyKey) || '[]');
            modalHistoryList.innerHTML = '';
            
            if (history.length === 0) {
                modalHistoryList.innerHTML = '<div class="history-item">暂无历史记录</div>';
            } else {
                history.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'history-item';
                    div.innerHTML = `
                        <div>
                            <span>${item.text.substring(0, 50)}${item.text.length > 50 ? '...' : ''}</span>
                            <span class="timestamp">${item.timestamp}</span>
                        </div>
                        <div style="margin-top: 5px; font-size: 12px; color: #666;">
                            ${item.text.length} 字符
                        </div>
                    `;
                    div.addEventListener('click', () => {
                        textInput.value = item.text;
                        localStorage.setItem(storageKey, item.text);
                        status.textContent = '✅ 已加载历史记录';
                        status.classList.add('updated');
                        setTimeout(() => status.classList.remove('updated'), 2000);
                        updateStats();
                        historyModal.style.display = 'none';
                    });
                    modalHistoryList.appendChild(div);
                });
            }
            
            historyModal.style.display = 'block';
        });
        
        // 关闭模态框
        closeBtn.addEventListener('click', function() {
            historyModal.style.display = 'none';
        });
        
        window.addEventListener('click', function(event) {
            if (event.target == historyModal) {
                historyModal.style.display = 'none';
            }
        });
    
    </script>
</body>
</html>
